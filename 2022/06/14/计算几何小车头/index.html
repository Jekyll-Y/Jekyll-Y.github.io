ass="hljs-keyword">return</span> <span class="hljs-built_in">sqrt</span>((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y)+(a.z-b.z)*(a.z-b.z));&#125; <span class="hljs-comment">// 向量模长</span><br>    <span class="hljs-function"><span class="hljs-type">double</span> <span class="hljs-title">dot</span><span class="hljs-params">(geometric a1,geometric a2,geometric b1,geometric b2)</span></span>&#123;<span class="hljs-keyword">return</span> (a2.x-a1.x)*(b2.x-b1.x)+(a2.y-a1.y)*(b2.y-b1.y)+(a2.z-a1.z)*(b2.z-b1.z);&#125;<span class="hljs-comment">// 点积</span><br>    <span class="hljs-function">geometric <span class="hljs-title">cross</span><span class="hljs-params">(geometric a1,geometric a2,geometric b1,geometric b2)</span></span>&#123;geometric a,b;<span class="hljs-keyword">return</span> <span class="hljs-built_in">geometric</span>(a.y*b.z-b.y*a.z,b.x*a.z-a.x*b.z,a.x*b.y-b.x*a.y);&#125; <span class="hljs-comment">// 叉积</span><br>&#125;opt;<br><br><span class="hljs-keyword">struct</span> <span class="hljs-title class_">plane</span>&#123;<br>    geometric a,b,c;<br>    <span class="hljs-built_in">plane</span>(geometric A=origin,geometric B=origin,geometric C=origin):<span class="hljs-built_in">a</span>(A),<span class="hljs-built_in">b</span>(B),<span class="hljs-built_in">c</span>(C) &#123;&#125;<br>    <span class="hljs-function"><span class="hljs-type">double</span> <span class="hljs-title">area</span><span class="hljs-params">()</span></span>&#123;<span class="hljs-keyword">return</span> <span class="hljs-built_in">fabs</span>(opt.<span class="hljs-built_in">dis</span>(origin,opt.<span class="hljs-built_in">cross</span>(a,b,a,c)))/<span class="hljs-number">2.0</span>;&#125;<br>&#125;;<br><span class="hljs-comment">// 平面</span><br><br><span class="hljs-comment">// 三维计算几何</span><br><br></code></pre></td></tr></table></figure>
